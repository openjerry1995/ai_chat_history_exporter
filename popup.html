<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="title">AI Chat History Exporter</div>
  </div>

  <div class="platform-badge" id="platform-badge">Detecting...</div>

  <!-- 延迟配置部分 -->
  <div class="config-section">
    <div class="config-label">Export Delay (prevent blocking):</div>
    <select id="delay-mode" class="config-select">
      <option value="conservative">Conservative (3-6s)</option>
      <option value="normal" selected>Normal (2-4s)</option>
      <option value="aggressive">Aggressive (1-3s)</option>
      <option value="custom">Custom</option>
    </select>
    <input type="number" id="custom-delay" class="config-input hidden" min="1" max="30" value="2" placeholder="1-30s">
  </div>

  <div class="btn-group">
    <button id="btn-export-current" class="btn btn-primary btn-full">Export Current Chat</button>
  </div>
  <div class="btn-group">
    <button id="btn-export-all" class="btn btn-secondary btn-full">Export All History</button>
  </div>

  <div id="progress" class="progress hidden"></div>
  <div id="status" class="status hidden"></div>

  <div class="footer">
    <button id="btn-cancel" class="btn-cancel hidden">Stop Export</button>
    <p class="footer-note">Keep the chat tab open while exporting.</p>
    <div class="footer-links">
      <a class="donate-link" href="https://ko-fi.com/jerryopen" target="_blank" rel="noopener">Buy me a coffee ☕</a>
      <a class="btn-report" href="https://github.com/openjerry1995/ai_chat_history_exporter/issues/new" target="_blank" rel="noopener">Report issue</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
